<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>일단 쓴다 — 글쓰기 타이머</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;600&family=Cinzel:wght@500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:   #f0f4f8;
  --bg2:  #e8eef5;
  --bg3:  #dde5ef;
  --bg4:  #d0dbe8;
  --border:  #c5d0de;
  --border2: #b8c8d8;
  --text:  #1a2535;
  --text2: #4a6080;
  --text3: #8aa0b8;
  --gold:  #2e6da4;
  --gold2: #4a8bc4;
  --gold-glow: rgba(74,139,196,.18);
  --gold-dim:  rgba(46,109,164,.1);
  --green: #3a8a5a;
  --red:   #c04040;
  --serif: "Noto Serif KR", serif;
  --sans:  "Noto Sans KR", sans-serif;
  --mono:  "Courier New", monospace;
  --r: 10px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  -webkit-font-smoothing: antialiased;
}

/* ── HEADER ── */
header {
  width: 100%;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 0 28px;
  height: 54px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.logo {
  display: flex;
  align-items: center;
  gap: 9px;
  font-family: var(--serif);
  font-size: 16px;
  font-weight: 700;
  color: var(--gold2);
  letter-spacing: .04em;
}
.logo-dot {
  width: 7px; height: 7px;
  background: var(--gold);
  border-radius: 50%;
  animation: pulse 3s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:.3} 50%{opacity:1} }
.logo-sub {
  font-family: var(--sans);
  font-size: 10px;
  color: var(--text3);
  font-weight: 400;
  letter-spacing: .08em;
}
.promo-btn {
  background: var(--gold);
  color: #fff;
  border: none;
  border-radius: 20px;
  padding: 6px 14px;
  font-family: var(--sans);
  font-size: 11.5px;
  font-weight: 600;
  cursor: pointer;
  transition: background .15s, transform .1s;
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 5px;
}
.promo-btn:hover { background: var(--gold2); transform: translateY(-1px); }

/* ── MAIN LAYOUT ── */
main {
  width: 100%;
  max-width: 560px;
  padding: 36px 20px 60px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

/* ── CARD ── */
.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 24px 24px 20px;
}
.card-title {
  font-size: 10px;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--text3);
  font-weight: 600;
  margin-bottom: 18px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.card-title::before {
  content: "";
  display: inline-block;
  width: 3px; height: 11px;
  background: var(--gold);
  border-radius: 2px;
}

/* ── SETUP GRID ── */
.setup-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}
.setup-item label {
  display: block;
  font-size: 11px;
  color: var(--text3);
  margin-bottom: 6px;
  font-weight: 500;
}
.stepper {
  display: flex;
  align-items: center;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: var(--r);
  overflow: hidden;
}
.stepper button {
  width: 36px; height: 38px;
  background: none;
  border: none;
  color: var(--text2);
  font-size: 18px;
  cursor: pointer;
  transition: all .15s;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.stepper button:hover { background: var(--bg4); color: var(--gold2); }
.stepper input {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  text-align: center;
  font-family: var(--mono);
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
  min-width: 0;
}
.stepper-unit {
  font-size: 10px;
  color: var(--text3);
  padding-right: 10px;
  white-space: nowrap;
}

/* ── TIMER RING ── */
.timer-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 24px;
}
.ring-container {
  position: relative;
  width: 220px; height: 220px;
}
.ring-svg { width: 100%; height: 100%; transform: rotate(-90deg); }
.ring-track { fill: none; stroke: var(--bg3); stroke-width: 10; }
.ring-fill {
  fill: none;
  stroke: url(#ringGrad);
  stroke-width: 10;
  stroke-linecap: round;
  transition: stroke-dashoffset 1s linear;
}
.timer-inner {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
}
.timer-display {
  font-family: var(--mono);
  font-size: 46px;
  font-weight: 700;
  color: var(--gold2);
  letter-spacing: .04em;
  line-height: 1;
}
.timer-label {
  font-size: 11px;
  color: var(--text3);
  letter-spacing: .08em;
}
.timer-session-badge {
  background: var(--gold-dim);
  border: 1px solid var(--border2);
  border-radius: 20px;
  padding: 3px 10px;
  font-size: 11px;
  color: var(--gold2);
  font-weight: 600;
}

/* ── CONTROLS ── */
.controls {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
}
.btn {
  height: 40px;
  padding: 0 20px;
  border-radius: var(--r);
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all .15s;
  border: 1px solid var(--border2);
  background: var(--bg3);
  color: var(--text2);
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.btn:hover { background: var(--bg4); color: var(--text); }
.btn.primary {
  background: var(--gold);
  border-color: var(--gold);
  color: #fff;
  min-width: 110px;
  justify-content: center;
}
.btn.primary:hover { background: var(--gold2); border-color: var(--gold2); }
.btn.danger { border-color: var(--red); color: var(--red); }
.btn.danger:hover { background: rgba(192,64,64,.08); }
.btn:disabled { opacity: .4; cursor: not-allowed; }

/* ── PROGRESS CARD ── */
.progress-numbers {
  display: flex;
  gap: 0;
  margin-bottom: 14px;
}
.pn-item {
  flex: 1;
  text-align: center;
  padding: 12px 8px;
  background: var(--bg3);
  border: 1px solid var(--border);
}
.pn-item:first-child { border-radius: var(--r) 0 0 var(--r); }
.pn-item:last-child  { border-radius: 0 var(--r) var(--r) 0; }
.pn-item + .pn-item  { border-left: none; }
.pn-val {
  font-family: var(--serif);
  font-size: 26px;
  font-weight: 700;
  color: var(--gold2);
  line-height: 1;
  display: block;
}
.pn-val.muted { color: var(--text3); }
.pn-label {
  font-size: 10px;
  color: var(--text3);
  margin-top: 4px;
  display: block;
}

/* progress bar */
.prog-bar-wrap { margin-bottom: 10px; }
.prog-bar-labels {
  display: flex;
  justify-content: space-between;
  font-size: 10.5px;
  color: var(--text3);
  margin-bottom: 5px;
}
.prog-bar-labels .done { color: var(--gold2); font-weight: 600; }
.prog-bar-track {
  height: 5px;
  background: var(--bg3);
  border-radius: 3px;
  overflow: hidden;
}
.prog-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold), var(--gold2));
  border-radius: 3px;
  transition: width .6s cubic-bezier(.34,1.56,.64,1);
}

/* session dots */
.session-dots {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-top: 10px;
}
.session-dot {
  width: 12px; height: 12px;
  border-radius: 3px;
  background: var(--bg3);
  border: 1px solid var(--border2);
  transition: all .3s;
}
.session-dot.done {
  background: var(--gold);
  border-color: var(--gold);
}
.session-dot.current {
  background: transparent;
  border-color: var(--gold);
  box-shadow: 0 0 5px var(--gold-glow);
  animation: dotpulse 1.5s ease-in-out infinite;
}
@keyframes dotpulse { 0%,100%{opacity:.5} 50%{opacity:1} }

/* ── FEEDBACK OVERLAY ── */
#feedback-overlay {
  position: fixed;
  inset: 0;
  background: rgba(10, 18, 30, .82);
  backdrop-filter: blur(6px);
  z-index: 200;
  display: none;
  align-items: center;
  justify-content: center;
}
#feedback-overlay.show { display: flex; }
.feedback-box {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 18px;
  padding: 36px 32px 30px;
  max-width: 380px;
  width: 90vw;
  text-align: center;
  box-shadow: 0 32px 80px rgba(0,0,0,.5);
  animation: popIn .35s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn {
  from { transform: scale(.88) translateY(20px); opacity: 0; }
  to   { transform: scale(1)   translateY(0);    opacity: 1; }
}
.feedback-emoji { font-size: 48px; margin-bottom: 12px; }
.feedback-title {
  font-family: var(--serif);
  font-size: 20px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 8px;
}
.feedback-main {
  font-size: 14px;
  color: var(--text2);
  line-height: 1.7;
  margin-bottom: 20px;
}
.feedback-main strong { color: var(--gold2); font-weight: 700; }
.feedback-stat-row {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin-bottom: 22px;
}
.fstat {
  flex: 1;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 10px 6px;
}
.fstat-val {
  font-family: var(--serif);
  font-size: 22px;
  font-weight: 700;
  color: var(--gold2);
  display: block;
  line-height: 1;
}
.fstat-label {
  font-size: 10px;
  color: var(--text3);
  margin-top: 4px;
  display: block;
}
.feedback-promo {
  background: var(--gold-dim);
  border: 1px solid var(--border2);
  border-radius: var(--r);
  padding: 12px 14px;
  margin-bottom: 20px;
  font-size: 12px;
  color: var(--text2);
  line-height: 1.6;
  text-align: left;
}
.feedback-promo a {
  color: var(--gold2);
  font-weight: 600;
  text-decoration: none;
}
.feedback-promo a:hover { text-decoration: underline; }
.feedback-btns {
  display: flex;
  gap: 8px;
  justify-content: center;
}

/* ── SETUP OVERLAY ── */
#setup-overlay {
  position: fixed;
  inset: 0;
  background: rgba(10, 18, 30, .82);
  backdrop-filter: blur(6px);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
}
.setup-box {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 18px;
  padding: 36px 32px 28px;
  max-width: 380px;
  width: 90vw;
  box-shadow: 0 32px 80px rgba(0,0,0,.5);
  animation: popIn .35s cubic-bezier(.34,1.56,.64,1);
}
.setup-box-title {
  font-family: var(--serif);
  font-size: 19px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 6px;
}
.setup-box-desc {
  font-size: 12.5px;
  color: var(--text3);
  margin-bottom: 24px;
  line-height: 1.6;
}
.setup-row {
  margin-bottom: 18px;
}
.setup-row label {
  display: block;
  font-size: 11.5px;
  color: var(--text2);
  font-weight: 600;
  margin-bottom: 7px;
}

/* ── FOOTER ── */
footer {
  text-align: center;
  font-size: 11px;
  color: var(--text3);
  padding: 20px;
  line-height: 1.8;
}
footer a { color: var(--gold2); text-decoration: none; }
footer a:hover { text-decoration: underline; }

/* ── TOAST ── */
#toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--bg2);
  border: 1px solid var(--gold);
  border-radius: 30px;
  padding: 9px 18px;
  font-size: 12.5px;
  color: var(--text);
  z-index: 300;
  transition: transform .4s cubic-bezier(.34,1.56,.64,1);
  box-shadow: 0 8px 32px rgba(0,0,0,.3);
  pointer-events: none;
  white-space: nowrap;
}
#toast.show { transform: translateX(-50%) translateY(0); }

/* ── RESPONSIVE ── */
@media (max-width: 480px) {
  main { padding: 20px 12px 50px; }
  .timer-display { font-size: 38px; }
  .ring-container { width: 180px; height: 180px; }
  .setup-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <span class="logo-dot"></span>
    일단 쓴다
    <span class="logo-sub">글쓰기 타이머</span>
  </div>
  <a class="promo-btn" href="https://twitter.com/E_FFILIA" target="_blank" rel="noopener">
    🐦 @E_FFILIA
  </a>
</header>

<!-- INITIAL SETUP OVERLAY -->
<div id="setup-overlay">
  <div class="setup-box">
    <div class="feedback-emoji">✍️</div>
    <div class="setup-box-title">목표를 설정하세요</div>
    <div class="setup-box-desc">목표 화수와 세션 시간을 정하면<br>오늘부터 바로 집필을 시작할 수 있습니다.</div>

    <div class="setup-row">
      <label>목표 화수 (완결까지 몇 회차?)</label>
      <div class="stepper">
        <button onclick="stepSetup('goalEp',-5)">−</button>
        <input id="goalEpInput" type="number" value="100" min="1" max="9999">
        <span class="stepper-unit">화</span>
        <button onclick="stepSetup('goalEp',+5)">+</button>
      </div>
    </div>

    <div class="setup-row">
      <label>세션당 집필 시간</label>
      <div class="stepper">
        <button onclick="stepSetup('sessionMin',-5)">−</button>
        <input id="sessionMinInput" type="number" value="25" min="1" max="180">
        <span class="stepper-unit">분</span>
        <button onclick="stepSetup('sessionMin',+5)">+</button>
      </div>
    </div>

    <div class="setup-row">
      <label>세션당 목표 집필량</label>
      <div class="stepper">
        <button onclick="stepSetup('wordGoal',-500)">−</button>
        <input id="wordGoalInput" type="number" value="2000" min="100" max="50000">
        <span class="stepper-unit">자</span>
        <button onclick="stepSetup('wordGoal',+500)">+</button>
      </div>
    </div>

    <button class="btn primary" style="width:100%;height:44px;font-size:14px;margin-top:4px;" onclick="confirmSetup()">
      집필 시작하기 →
    </button>
  </div>
</div>

<!-- MAIN -->
<main>

  <!-- TIMER CARD -->
  <div class="card">
    <div class="card-title">집필 타이머</div>

    <div class="timer-wrap">
      <!-- Ring -->
      <div class="ring-container">
        <svg class="ring-svg" viewBox="0 0 220 220">
          <defs>
            <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%"   stop-color="#2e6da4"/>
              <stop offset="100%" stop-color="#4a8bc4"/>
            </linearGradient>
          </defs>
          <circle class="ring-track" cx="110" cy="110" r="96"/>
          <circle class="ring-fill"  cx="110" cy="110" r="96" id="ringFill"/>
        </svg>
        <div class="timer-inner">
          <div id="timerDisplay" class="timer-display">25:00</div>
          <div class="timer-label" id="timerLabel">준비</div>
        </div>
      </div>

      <!-- Session badge -->
      <div class="timer-session-badge" id="sessionBadge">세션 1 · 0 / 0화 완료</div>

      <!-- Controls -->
      <div class="controls">
        <button class="btn" onclick="resetTimer()" id="resetBtn">↺ 리셋</button>
        <button class="btn primary" onclick="toggleTimer()" id="startBtn">▶ 시작</button>
        <button class="btn" onclick="openSettings()" title="시간 조절">⚙ 설정</button>
      </div>
    </div>
  </div>

  <!-- QUICK ADJUST -->
  <div class="card" id="settingsCard" style="display:none;">
    <div class="card-title">세션 설정 변경</div>
    <div class="setup-grid">
      <div class="setup-item">
        <label>집필 시간 (분)</label>
        <div class="stepper">
          <button onclick="stepLive('sessionMin',-5)">−</button>
          <input id="liveSessionMin" type="number" value="25" min="1" max="180">
          <span class="stepper-unit">분</span>
          <button onclick="stepLive('sessionMin',+5)">+</button>
        </div>
      </div>
      <div class="setup-item">
        <label>목표 화수</label>
        <div class="stepper">
          <button onclick="stepLive('goalEp',-5)">−</button>
          <input id="liveGoalEp" type="number" value="100" min="1" max="9999">
          <span class="stepper-unit">화</span>
          <button onclick="stepLive('goalEp',+5)">+</button>
        </div>
      </div>
    </div>
    <div style="display:flex;gap:8px;margin-top:4px;">
      <button class="btn primary" onclick="applySettings()" style="flex:1;">적용</button>
      <button class="btn" onclick="closeSettings()">닫기</button>
    </div>
  </div>

  <!-- PROGRESS CARD -->
  <div class="card">
    <div class="card-title">오늘의 진도</div>

    <div class="progress-numbers">
      <div class="pn-item">
        <span class="pn-val" id="pnDone">0</span>
        <span class="pn-label">완료 세션</span>
      </div>
      <div class="pn-item">
        <span class="pn-val muted" id="pnRemain">—</span>
        <span class="pn-label">남은 세션</span>
      </div>
      <div class="pn-item">
        <span class="pn-val" id="pnEpDone">0</span>
        <span class="pn-label">완료 화수</span>
      </div>
      <div class="pn-item">
        <span class="pn-val muted" id="pnGoal">100</span>
        <span class="pn-label">목표 화수</span>
      </div>
    </div>

    <div class="prog-bar-wrap">
      <div class="prog-bar-labels">
        <span id="progLabel">0%  완료</span>
        <span class="done" id="progDoneLabel">0 / 100화</span>
      </div>
      <div class="prog-bar-track">
        <div class="prog-bar-fill" id="progFill" style="width:0%"></div>
      </div>
    </div>

    <div class="session-dots" id="sessionDots"></div>
  </div>

  <!-- LOG CARD -->
  <div class="card" id="logCard" style="display:none;">
    <div class="card-title">세션 기록</div>
    <div id="logList" style="display:flex;flex-direction:column;gap:8px;"></div>
    <button class="btn danger" style="width:100%;margin-top:14px;height:36px;" onclick="resetAll()">🗑 전체 초기화</button>
  </div>

</main>

<footer>
  무료 웹툴 · <strong>일단 쓴다</strong> 글쓰기 타이머<br>
  만든 사람 → <a href="https://twitter.com/E_FFILIA" target="_blank">@E_FFILIA</a>
</footer>

<!-- FEEDBACK OVERLAY -->
<div id="feedback-overlay">
  <div class="feedback-box">
    <div class="feedback-emoji" id="fbEmoji">🎉</div>
    <div class="feedback-title" id="fbTitle">세션 완료!</div>
    <div class="feedback-main" id="fbMain"></div>
    <div class="feedback-stat-row">
      <div class="fstat">
        <span class="fstat-val" id="fbSessions">1</span>
        <span class="fstat-label">완료 세션</span>
      </div>
      <div class="fstat">
        <span class="fstat-val" id="fbEpDone">0</span>
        <span class="fstat-label">완료 화수</span>
      </div>
      <div class="fstat">
        <span class="fstat-val" id="fbRemain">—</span>
        <span class="fstat-label">남은 화수</span>
      </div>
    </div>
    <div class="feedback-btns">
      <button class="btn" onclick="shareResult()">🐦 공유하기</button>
      <button class="btn primary" onclick="closeFeedback()">다음 세션 →</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
// ─────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────
let state = {
  goalEp:     100,
  sessionMin: 25,
  wordGoal:   2000,
  sessions:   [],        // [{at, minutes, epDone}]
  running:    false,
  paused:     false,
  remaining:  0,         // seconds
  currentEpThisSession: 0,
};

let timerInterval = null;
const CIRCUMFERENCE = 2 * Math.PI * 96;  // r=96

// ─────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────
function init() {
  const saved = localStorage.getItem('writingTimerState');
  if (saved) {
    try {
      const s = JSON.parse(saved);
      state.goalEp     = s.goalEp     || 100;
      state.sessionMin = s.sessionMin || 25;
      state.wordGoal   = s.wordGoal   || 2000;
      state.sessions   = s.sessions   || [];
      state.remaining  = state.sessionMin * 60;
    } catch(e) {}
  }
  updateTimerDisplay(state.sessionMin * 60);
  updateRing(1);
  updateProgress();
  renderDots();
  renderLog();
  syncLiveInputs();
}

// ─────────────────────────────────────────
//  SETUP OVERLAY
// ─────────────────────────────────────────
function confirmSetup() {
  state.goalEp     = Math.max(1, parseInt(document.getElementById('goalEpInput').value) || 100);
  state.sessionMin = Math.max(1, parseInt(document.getElementById('sessionMinInput').value) || 25);
  state.wordGoal   = Math.max(100, parseInt(document.getElementById('wordGoalInput').value) || 2000);
  state.remaining  = state.sessionMin * 60;
  document.getElementById('setup-overlay').style.display = 'none';
  updateTimerDisplay(state.remaining);
  updateRing(1);
  updateProgress();
  renderDots();
  syncLiveInputs();
  saveState();
  toast('목표 설정 완료! 집필을 시작해보세요 ✍️');
}

function stepSetup(field, delta) {
  const ids = { goalEp: 'goalEpInput', sessionMin: 'sessionMinInput', wordGoal: 'wordGoalInput' };
  const el = document.getElementById(ids[field]);
  let v = parseInt(el.value) || 0;
  v = Math.max(parseInt(el.min), Math.min(parseInt(el.max), v + delta));
  el.value = v;
}

// ─────────────────────────────────────────
//  SETTINGS (LIVE)
// ─────────────────────────────────────────
function openSettings() {
  document.getElementById('settingsCard').style.display = 'block';
  syncLiveInputs();
}
function closeSettings() {
  document.getElementById('settingsCard').style.display = 'none';
}
function syncLiveInputs() {
  document.getElementById('liveSessionMin').value = state.sessionMin;
  document.getElementById('liveGoalEp').value     = state.goalEp;
}
function stepLive(field, delta) {
  const ids = { sessionMin: 'liveSessionMin', goalEp: 'liveGoalEp' };
  const mins = { sessionMin: 1, goalEp: 1 };
  const maxs = { sessionMin: 180, goalEp: 9999 };
  const el = document.getElementById(ids[field]);
  let v = parseInt(el.value) || 0;
  v = Math.max(mins[field], Math.min(maxs[field], v + delta));
  el.value = v;
}
function applySettings() {
  if (state.running) { toast('타이머 실행 중에는 변경할 수 없습니다.'); return; }
  state.sessionMin = Math.max(1, parseInt(document.getElementById('liveSessionMin').value) || 25);
  state.goalEp     = Math.max(1, parseInt(document.getElementById('liveGoalEp').value)     || 100);
  state.remaining  = state.sessionMin * 60;
  updateTimerDisplay(state.remaining);
  updateRing(1);
  updateProgress();
  closeSettings();
  saveState();
  toast('설정 적용 완료!');
}

// ─────────────────────────────────────────
//  TIMER
// ─────────────────────────────────────────
function toggleTimer() {
  if (!state.running && !state.paused) {
    startTimer();
  } else if (state.running) {
    pauseTimer();
  } else {
    resumeTimer();
  }
}

function startTimer() {
  state.running = true;
  state.paused  = false;
  state.remaining = state.sessionMin * 60;
  state.currentEpThisSession = 0;
  document.getElementById('startBtn').textContent = '⏸ 일시정지';
  document.getElementById('timerLabel').textContent = '집필 중';
  renderDots();
  tick();
  timerInterval = setInterval(tick, 1000);
}

function pauseTimer() {
  state.running = false;
  state.paused  = true;
  clearInterval(timerInterval);
  document.getElementById('startBtn').textContent = '▶ 계속';
  document.getElementById('timerLabel').textContent = '일시정지';
}

function resumeTimer() {
  state.running = true;
  state.paused  = false;
  document.getElementById('startBtn').textContent = '⏸ 일시정지';
  document.getElementById('timerLabel').textContent = '집필 중';
  timerInterval = setInterval(tick, 1000);
}

function resetTimer() {
  clearInterval(timerInterval);
  state.running  = false;
  state.paused   = false;
  state.remaining = state.sessionMin * 60;
  document.getElementById('startBtn').textContent = '▶ 시작';
  document.getElementById('timerLabel').textContent = '준비';
  updateTimerDisplay(state.remaining);
  updateRing(1);
  renderDots();
}

function tick() {
  if (state.remaining <= 0) {
    sessionComplete();
    return;
  }
  state.remaining--;
  const ratio = state.remaining / (state.sessionMin * 60);
  updateTimerDisplay(state.remaining);
  updateRing(ratio);
}

function sessionComplete() {
  clearInterval(timerInterval);
  state.running = false;
  state.paused  = false;

  // Ask how many episodes done this session (prompt → simplified: auto-guess or ask)
  const epDone = promptEpisodeDone();

  const session = {
    at: new Date().toISOString(),
    minutes: state.sessionMin,
    epDone: epDone,
  };
  state.sessions.push(session);
  saveState();

  updateTimerDisplay(0);
  updateRing(0);
  document.getElementById('startBtn').textContent = '▶ 시작';
  document.getElementById('timerLabel').textContent = '완료!';
  updateProgress();
  renderDots();
  renderLog();

  showFeedback(epDone);
  playDone();
}

function promptEpisodeDone() {
  // Mini inline prompt in feedback overlay later; for now ask via prompt()
  // We'll use a simple approach: show a quick number dialog
  const v = window.prompt(`세션 완료! 이번 세션에 몇 화를 완성했나요?\n(0이라도 괜찮아요)`, '0');
  const n = parseInt(v);
  return isNaN(n) || n < 0 ? 0 : n;
}

// ─────────────────────────────────────────
//  RING
// ─────────────────────────────────────────
function updateRing(ratio) {
  const fill = document.getElementById('ringFill');
  const offset = CIRCUMFERENCE * (1 - ratio);
  fill.style.strokeDasharray  = CIRCUMFERENCE;
  fill.style.strokeDashoffset = offset;
}

// ─────────────────────────────────────────
//  DISPLAY
// ─────────────────────────────────────────
function updateTimerDisplay(sec) {
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  document.getElementById('timerDisplay').textContent =
    String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  
  const sessNum   = state.sessions.length + (state.running || state.paused ? 1 : 0);
  const epTotal   = totalEpDone();
  document.getElementById('sessionBadge').textContent =
    `세션 ${sessNum} · ${epTotal} / ${state.goalEp}화 완료`;
}

function totalEpDone() {
  return state.sessions.reduce((s, x) => s + (x.epDone || 0), 0);
}

function totalSessions() {
  return state.sessions.length;
}

// ─────────────────────────────────────────
//  PROGRESS
// ─────────────────────────────────────────
function updateProgress() {
  const done   = totalEpDone();
  const goal   = state.goalEp;
  const remain = Math.max(0, goal - done);
  const sess   = totalSessions();
  const pct    = goal > 0 ? Math.min(100, Math.round((done / goal) * 100)) : 0;

  // Estimate sessions left based on avg ep/session
  const avgEpPerSession = sess > 0 ? done / sess : 0;
  const sessRemain = avgEpPerSession > 0
    ? Math.ceil(remain / avgEpPerSession)
    : '—';

  document.getElementById('pnDone').textContent   = sess;
  document.getElementById('pnRemain').textContent = sessRemain;
  document.getElementById('pnEpDone').textContent = done;
  document.getElementById('pnGoal').textContent   = goal;

  document.getElementById('progLabel').textContent     = `${pct}% 완료`;
  document.getElementById('progDoneLabel').textContent = `${done} / ${goal}화`;
  document.getElementById('progFill').style.width      = pct + '%';

  if (sess > 0) {
    document.getElementById('logCard').style.display = 'block';
  }
}

// ─────────────────────────────────────────
//  SESSION DOTS
// ─────────────────────────────────────────
function renderDots() {
  const container = document.getElementById('sessionDots');
  const totalDots = Math.min(50, Math.max(10, state.sessions.length + 3));
  container.innerHTML = '';
  for (let i = 0; i < totalDots; i++) {
    const d = document.createElement('div');
    d.className = 'session-dot';
    if (i < state.sessions.length) d.classList.add('done');
    else if (i === state.sessions.length && (state.running || state.paused))
      d.classList.add('current');
    container.appendChild(d);
  }
}

// ─────────────────────────────────────────
//  LOG
// ─────────────────────────────────────────
function renderLog() {
  const list = document.getElementById('logList');
  list.innerHTML = '';
  if (!state.sessions.length) return;
  [...state.sessions].reverse().forEach((s, i) => {
    const idx = state.sessions.length - i;
    const d   = new Date(s.at);
    const timeStr = d.toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit'});
    const el = document.createElement('div');
    el.style.cssText = `
      display:flex; align-items:center; gap:10px;
      background:var(--bg3); border:1px solid var(--border);
      border-radius:var(--r); padding:10px 12px; font-size:12px;
    `;
    el.innerHTML = `
      <span style="color:var(--gold2);font-weight:700;font-family:var(--mono);font-size:13px;">${String(idx).padStart(2,'0')}</span>
      <span style="color:var(--text2);flex:1;">${s.minutes}분 집필</span>
      <span style="color:var(--green);font-weight:600;">${s.epDone}화 완성</span>
      <span style="color:var(--text3);">${timeStr}</span>
    `;
    list.appendChild(el);
  });
}

// ─────────────────────────────────────────
//  FEEDBACK
// ─────────────────────────────────────────
function showFeedback(epDone) {
  const sess   = state.sessions.length;
  const total  = totalEpDone();
  const goal   = state.goalEp;
  const remain = Math.max(0, goal - total);

  const emojis   = ['🎉','✨','📖','🔥','💫','🌟'];
  const emoji    = emojis[Math.floor(Math.random() * emojis.length)];

  let mainText = '';
  if (remain <= 0) {
    mainText = `<strong>완결 달성!</strong> 목표 ${goal}화를 모두 완성했습니다. 정말 대단해요!`;
  } else if (sess === 1) {
    mainText = `첫 세션 완료! <strong>${state.sessionMin}분</strong> 동안 집필했습니다.<br>꾸준히 이어가면 목표까지 <strong>${remain}화</strong> 남았습니다.`;
  } else {
    const avg = sess > 0 ? (total / sess).toFixed(1) : 0;
    mainText = `<strong>${sess}회차 세션</strong> 완료! 오늘도 수고했습니다.<br>세션 평균 <strong>${avg}화</strong>씩 쓰고 있어요.`;
  }

  document.getElementById('fbEmoji').textContent   = emoji;
  document.getElementById('fbTitle').textContent   = `${sess}회차 세션 완료!`;
  document.getElementById('fbMain').innerHTML      = mainText;
  document.getElementById('fbSessions').textContent = sess;
  document.getElementById('fbEpDone').textContent  = total;
  document.getElementById('fbRemain').textContent  = remain > 0 ? remain + '화' : '완결!';

  document.getElementById('feedback-overlay').classList.add('show');
}

function closeFeedback() {
  document.getElementById('feedback-overlay').classList.remove('show');
  state.remaining = state.sessionMin * 60;
  updateTimerDisplay(state.remaining);
  updateRing(1);
  renderDots();
}

function shareResult() {
  const sess  = state.sessions.length;
  const total = totalEpDone();
  const goal  = state.goalEp;
  const pct   = goal > 0 ? Math.round((total/goal)*100) : 0;
  const text  = `✍️ 오늘 글쓰기 타이머 ${sess}세션 완료!\n` +
                `📖 ${total}/${goal}화 진행 (${pct}%)\n` +
                `일단 쓴다 타이머로 집필 중 🔥\n` +
                `#웹소설 #글쓰기 #일단쓴다`;
  const url   = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`;
  window.open(url, '_blank');
}

// ─────────────────────────────────────────
//  SOUND
// ─────────────────────────────────────────
function playDone() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const notes = [523, 659, 784, 1047];
    notes.forEach((freq, i) => {
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = freq;
      osc.type = 'sine';
      const t = ctx.currentTime + i * 0.18;
      gain.gain.setValueAtTime(0.15, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
      osc.start(t);
      osc.stop(t + 0.4);
    });
  } catch(e) {}
}

// ─────────────────────────────────────────
//  PERSIST
// ─────────────────────────────────────────
function saveState() {
  localStorage.setItem('writingTimerState', JSON.stringify({
    goalEp:     state.goalEp,
    sessionMin: state.sessionMin,
    wordGoal:   state.wordGoal,
    sessions:   state.sessions,
  }));
}

function resetAll() {
  if (!confirm('모든 세션 기록을 초기화할까요?')) return;
  state.sessions  = [];
  state.remaining = state.sessionMin * 60;
  localStorage.removeItem('writingTimerState');
  resetTimer();
  updateProgress();
  renderDots();
  renderLog();
  document.getElementById('logCard').style.display = 'none';
  toast('초기화되었습니다.');
}

// ─────────────────────────────────────────
//  TOAST
// ─────────────────────────────────────────
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2800);
}

// ─────────────────────────────────────────
//  CHECK SAVED STATE → SKIP SETUP IF EXISTS
// ─────────────────────────────────────────
(function checkSaved() {
  const saved = localStorage.getItem('writingTimerState');
  if (saved) {
    document.getElementById('setup-overlay').style.display = 'none';
  }
})();

// ─────────────────────────────────────────
//  BOOT
// ─────────────────────────────────────────
init();
</script>
</body>
</html>
